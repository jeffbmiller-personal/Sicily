<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a2238">
<title>Sicily Villa Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a2238;
  --ink-soft:#3a4361;
  --paper:#f4ede1;
  --paper-2:#ece2d2;
  --card:#fbf7ef;
  --terra:#c5683f;
  --terra-deep:#a8502d;
  --ochre:#cf9b4e;
  --sea:#2f7d8c;
  --line:rgba(26,34,56,.12);
  --line-strong:rgba(26,34,56,.22);
  --shadow:0 1px 2px rgba(26,34,56,.06),0 8px 24px rgba(26,34,56,.08);
  --maxw:560px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Hanken Grotesk',sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding-bottom:88px;
  background-image:radial-gradient(circle at 20% 0%,rgba(207,155,78,.10),transparent 40%),radial-gradient(circle at 90% 10%,rgba(47,125,140,.08),transparent 45%);
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px;}

/* ---- Header / villa switch ---- */
header{
  position:sticky;top:0;z-index:40;
  background:var(--ink);
  color:var(--paper);
  padding:calc(env(safe-area-inset-top) + 14px) 0 0;
  box-shadow:0 6px 20px rgba(26,34,56,.18);
}
.brand{
  font-family:'Hanken Grotesk',sans-serif;
  font-size:10px;letter-spacing:.32em;text-transform:uppercase;
  opacity:.6;text-align:center;margin-bottom:10px;
}
.switch{
  display:flex;gap:6px;background:rgba(255,255,255,.07);
  border-radius:999px;padding:5px;margin:0 18px;
}
.switch button{
  flex:1;border:0;background:transparent;color:rgba(244,237,225,.55);
  font-family:'Fraunces',serif;font-size:18px;font-weight:500;
  padding:9px 4px;border-radius:999px;cursor:pointer;
  transition:all .35s cubic-bezier(.4,0,.2,1);letter-spacing:.01em;
}
.switch button.active{background:var(--terra);color:#fff;box-shadow:0 3px 10px rgba(168,80,45,.45);}
.locale{
  text-align:center;font-size:11.5px;letter-spacing:.05em;
  padding:9px 0 13px;opacity:.7;
}
.locale span{color:var(--ochre);}

/* ---- Search ---- */
.searchbar{margin:16px 0 4px;position:relative;}
.searchbar input{
  width:100%;border:1px solid var(--line-strong);background:var(--card);
  border-radius:14px;padding:13px 14px 13px 40px;font-size:15px;font-family:inherit;
  color:var(--ink);box-shadow:var(--shadow);
}
.searchbar input:focus{outline:none;border-color:var(--terra);}
.searchbar svg{position:absolute;left:13px;top:13px;opacity:.4;}
.search-results{margin-top:10px;}
.no-res{padding:20px;text-align:center;color:var(--ink-soft);font-size:14px;}

/* ---- Quick essentials ---- */
.essentials{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 6px;}
.ess{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px;box-shadow:var(--shadow);text-decoration:none;color:var(--ink);
  display:block;transition:transform .15s;
}
.ess:active{transform:scale(.97);}
.ess .lab{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--terra-deep);font-weight:600;}
.ess .val{font-family:'Fraunces',serif;font-size:19px;margin-top:3px;font-weight:500;word-break:break-word;}
.ess .sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
.ess.wide{grid-column:1/3;}
.ess.dark{background:var(--ink);color:var(--paper);border-color:transparent;}
.ess.dark .lab{color:var(--ochre);}
.ess.terra{background:var(--terra);color:#fff;border-color:transparent;}
.ess.terra .lab{color:rgba(255,255,255,.8);}

/* ---- Section nav (chips) ---- */
.section-title{
  font-family:'Fraunces',serif;font-size:13px;letter-spacing:.05em;
  text-transform:uppercase;color:var(--ink-soft);margin:26px 2px 12px;font-weight:600;
  display:flex;align-items:center;gap:9px;
}
.section-title::before{content:"";width:18px;height:1px;background:var(--terra);}

.cards{display:flex;flex-direction:column;gap:11px;}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  overflow:hidden;box-shadow:var(--shadow);
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 16px;cursor:pointer;user-select:none;gap:12px;
}
.card-head h3{
  margin:0;font-family:'Fraunces',serif;font-size:18px;font-weight:500;line-height:1.2;
  display:flex;align-items:center;gap:10px;
}
.card-head .ico{font-size:18px;line-height:1;width:24px;text-align:center;}
.chev{transition:transform .3s;flex-shrink:0;opacity:.45;}
.card.open .chev{transform:rotate(180deg);}
.card-body{
  max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);
}
.card.open .card-body{max-height:6000px;}
.card-inner{padding:0 16px 16px;border-top:1px solid var(--line);padding-top:14px;font-size:14.5px;color:var(--ink-soft);}
.card-inner p{margin:0 0 11px;}
.card-inner p:last-child{margin-bottom:0;}
.card-inner strong{color:var(--ink);font-weight:600;}
.card-inner .em{color:var(--terra-deep);font-weight:600;}

.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:14px;}
.kv:last-child{border-bottom:0;}
.kv .k{color:var(--ink-soft);}
.kv .v{color:var(--ink);font-weight:600;text-align:right;}

.tag{display:inline-block;background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:2px 9px;font-size:11.5px;font-weight:600;color:var(--ink-soft);margin:0 4px 4px 0;}
.tag.price{color:var(--terra-deep);}

a.tel,a.maplink{color:var(--sea);text-decoration:none;font-weight:600;border-bottom:1px solid rgba(47,125,140,.3);}
a.tel:active,a.maplink:active{opacity:.6;}

.place{padding:11px 0;border-bottom:1px solid var(--line);}
.place:last-child{border-bottom:0;}
.place .pn{font-family:'Fraunces',serif;font-size:15.5px;color:var(--ink);font-weight:500;}
.place .pd{font-size:13px;color:var(--ink-soft);margin-top:2px;}
.place .pmeta{margin-top:5px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

.note{background:rgba(207,155,78,.13);border-left:3px solid var(--ochre);padding:11px 13px;border-radius:0 10px 10px 0;font-size:13.5px;color:var(--ink-soft);margin:2px 0 12px;}
.note.warn{background:rgba(197,104,63,.12);border-color:var(--terra);}
.note strong{color:var(--ink);}

ol.steps{margin:0;padding-left:20px;}
ol.steps li{margin-bottom:9px;padding-left:3px;}

/* ---- Bottom tab bar ---- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(251,247,239,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line-strong);
  display:flex;justify-content:space-around;
  padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
  max-width:var(--maxw);margin:0 auto;
}
nav.tabs button{
  background:none;border:0;font-family:inherit;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--ink-soft);font-size:10px;font-weight:600;letter-spacing:.02em;
  flex:1;padding:4px 0;transition:color .2s;
}
nav.tabs button .tico{font-size:19px;line-height:1;}
nav.tabs button.active{color:var(--terra-deep);}
nav.tabs button.active .tico{transform:translateY(-1px);}

.view{display:none;animation:fade .35s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.pagehd{font-family:'Fraunces',serif;font-size:28px;font-weight:500;margin:22px 2px 4px;line-height:1.05;}
.pagesub{font-size:13px;color:var(--ink-soft);margin:0 2px 4px;}

footer{text-align:center;font-size:11px;color:var(--ink-soft);opacity:.7;padding:26px 0 10px;letter-spacing:.04em;}
footer .tt{font-family:'Fraunces',serif;letter-spacing:.2em;}
</style>
</head>
<body>

<header>
  <div class="brand">The Thinking Traveller — Sicily</div>
  <div class="switch">
    <button id="btn-minerva" class="active" onclick="setVilla('minerva')">Minerva</button>
    <button id="btn-aljafar" onclick="setVilla('aljafar')">Al Jafar</button>
  </div>
  <div class="locale" id="locale"></div>
</header>

<div class="wrap">

  <!-- HOME -->
  <section class="view active" id="view-home">
    <div class="searchbar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input id="search" type="search" placeholder="Search wifi, pizza, fuse box, beach…" oninput="runSearch(this.value)" autocomplete="off">
    </div>
    <div id="search-wrap" class="search-results" style="display:none;"></div>

    <div id="home-content">
      <div class="essentials" id="essentials"></div>
      <div class="section-title">Good to know</div>
      <div class="cards" id="home-cards"></div>
    </div>
  </section>

  <!-- HOUSE -->
  <section class="view" id="view-house">
    <h1 class="pagehd">The House</h1>
    <p class="pagesub">Practical info, troubleshooting & service</p>
    <div class="cards" id="house-cards"></div>
  </section>

  <!-- OUT -->
  <section class="view" id="view-out">
    <h1 class="pagehd" id="out-hd">Out & About</h1>
    <p class="pagesub" id="out-sub"></p>
    <div class="cards" id="out-cards"></div>
  </section>

  <!-- EAT -->
  <section class="view" id="view-eat">
    <h1 class="pagehd" id="eat-hd">Where to Eat</h1>
    <p class="pagesub" id="eat-sub"></p>
    <div class="cards" id="eat-cards"></div>
  </section>

  <!-- SOS -->
  <section class="view" id="view-sos">
    <h1 class="pagehd">Help & Safety</h1>
    <p class="pagesub">Emergencies, support & the small print</p>
    <div class="essentials" id="sos-numbers"></div>
    <div class="cards" id="sos-cards"></div>
  </section>

  <footer>
    <a href="index.html" style="display:inline-block;margin-bottom:16px;padding:11px 20px;background:var(--ink);color:var(--paper);border-radius:999px;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:.02em;">‹ Back to the trip itinerary</a>
    <div class="tt">T</div>
    Your villa companion · keep it handy
  </footer>
</div>

<nav class="tabs">
  <button class="active" data-view="home" onclick="setView('home',this)"><span class="tico">✶</span>Essentials</button>
  <button data-view="house" onclick="setView('house',this)"><span class="tico">⌂</span>House</button>
  <button data-view="out" onclick="setView('out',this)"><span class="tico">⌖</span>Out</button>
  <button data-view="eat" onclick="setView('eat',this)"><span class="tico">✦</span>Eat</button>
  <button data-view="sos" onclick="setView('sos',this)"><span class="tico">✚</span>Help</button>
</nav>

<script>
/* ============ helpers ============ */
const tel = n => `<a class="tel" href="tel:${n.replace(/[^+\d]/g,'')}">${n}</a>`;
const map = (q,label)=>`<a class="maplink" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}">${label||q}</a>`;
const gps = (c)=>`https://www.google.com/maps/search/?api=1&query=${c}`;
const price = p => `<span class="tag price">${p}</span>`;

/* ============ shared data ============ */
const SHARED = {
  support: {
    title:"Thinking Traveller local team",
    body:`<p>The local team is on hand from 24h before arrival until you're home. Reach them by phone, SMS or email for delayed arrivals, finding the villa, power cuts, language help — anything unexpected.</p>
    <div class="note warn"><strong>Night & early morning (18:00–10:00):</strong> for urgent matters <strong>call directly</strong> — texts and WhatsApp may not arrive immediately. Messages sent after 18:00 are answered the next morning.</div>
    <p>Their first contact is usually a short intro SMS. No reply just means they assume all is well.</p>`
  },
  easypark:{
    title:"EasyPark app",
    body:`<p>Strongly recommended for on-street parking. Pay by the minute; start, extend or stop sessions from your phone. Needs roaming/data to work.</p>
    <p><strong>Setup:</strong> register, add your <strong>licence plate</strong> & a card/PayPal. The app finds your zone by GPS or you enter the meter's area code.</p>
    <div class="note"><strong>On the dashboard:</strong> display a slip of paper noting <strong>"EASYPARK"</strong>. Attendants check the plate — no physical ticket needed.</div>`
  },
  palermoZtl:{
    title:"Palermo ZTL & parking",
    body:`<p>Central Palermo is a <strong>ZTL (limited-traffic zone)</strong> — you need a pass or you'll be fined. Daily pass ~<strong>€5</strong> via the Comune di Palermo site, PalerMobilità app, or AMAT counters / tobacconists / newsagents. Activate on entry with your plate.</p>
    <div class="kv"><span class="k">Daytime ZTL</span><span class="v">Mon–Fri 08:00–20:00</span></div>
    <div class="kv"><span class="k">Night ZTL</span><span class="v">Fri/Sat/Sun late</span></div>
    <div class="kv"><span class="k">Vehicle</span><span class="v">Euro 3 petrol / Euro 4 diesel+</span></div>
    <p style="margin-top:12px"><strong>Park just outside the ZTL:</strong></p>
    <div class="place"><div class="pn">Parcheggio Orlando (Apcoa)</div><div class="pd">Under the Tribunal, old town. Near Capo Market & Teatro Massimo.</div><div class="pmeta">${map('Parcheggio Orlando Apcoa Palermo','Open in Maps')}</div></div>
    <div class="place"><div class="pn">Parcheggio Piazzale Ungheria</div><div class="pd">Behind Via Ruggiero Settimo, modern town. Limited spaces.</div><div class="pmeta">${map('Parcheggio Piazzale Ungheria Palermo','Open in Maps')}</div></div>
    <div class="place"><div class="pn">Lungomare Yasser Arafat</div><div class="pd">Street parking on the waterfront — for the oldest parts of Palermo.</div><div class="pmeta">${map('Lungomare Yasser Arafat Palermo','Open in Maps')}</div></div>`
  },
  damages:{
    title:"Damages & payments",
    body:`<p>If anything's damaged, tell the owner or local team as soon as possible and settle before you leave if you can.</p>
    <div class="note"><strong>Card payments</strong> for extra services or damages you couldn't pay in cash carry a <strong>5% admin charge</strong>. Extra services & hampers are normally paid <strong>in cash</strong> to the staff/owner.</div>`
  },
  checkin:{
    title:"Check-in & check-out",
    body:`<div class="kv"><span class="k">Check-in from</span><span class="v">16:00</span></div>
    <div class="kv"><span class="k">Check-out by</span><span class="v">10:00</span></div>
    <p style="margin-top:12px">Running late? <strong>Call the local team in advance</strong> so they can tell the owner. Need a very early checkout? They can arrange the handover the evening before.</p>
    <p>Cleaning after checkout is included — just leave things tidy and <strong>run the dishwasher</strong> before you go.</p>
    <p><strong>Early arrival / late flight?</strong> The team can suggest beach resorts, hotels & luggage drop-offs. Book stopover solutions ahead in peak summer.</p>`
  },
  hampers:{
    title:"Food hampers (pre-arrival)",
    body:`<p>Order through the local team before arrival. Pay in cash on arrival. Cancel within 48h of arrival (after shopping's done) and you cover the receipts.</p>
    <div class="kv"><span class="k">Small</span><span class="v">~€100 <span style="color:var(--ink-soft);font-weight:400">+ €30 fee</span></span></div>
    <div class="kv"><span class="k">Medium</span><span class="v">~€150 <span style="color:var(--ink-soft);font-weight:400">+ €35 fee</span></span></div>
    <div class="kv"><span class="k">Large</span><span class="v">~€200 <span style="color:var(--ink-soft);font-weight:400">+ €40 fee</span></span></div>
    <p style="margin-top:12px;font-size:13px">All include pasta, passata, pesto, olive oil, fruit & veg, cheese, eggs, milk, bread, water, juice & cured meats. Larger sizes add yoghurt, tuna, olives, cereal, more meat & a sweet treat.</p>`
  },
  generalSafety:{
    title:"General health & safety",
    body:`<p>Reasonable steps are taken for a safe stay, but standards vary by country. Full standards at <a class="maplink" target="_blank" rel="noopener" href="https://www.thethinkingtraveller.com/booking-your-holiday/health-and-safety">thethinkingtraveller.com</a>.</p>`
  },
  emergencyNums:[
    {lab:"All emergencies",val:"112",sub:"European number"},
    {lab:"Ambulance",val:"118",sub:"Medical"},
    {lab:"Fire",val:"115",sub:"Vigili del fuoco"},
    {lab:"Police",val:"113",sub:"Polizia"}
  ]
};

/* ============ AL JAFAR ============ */
const ALJAFAR = {
  name:"Al Jafar",
  locale:`Restored medieval tower near <span>Paceco · Trapani</span>, western Sicily`,
  gps:"37.962846,12.564952",
  wifi:{net:"Connection points throughout",pass:"aljafar2021"},
  caretakers:"Mommo & Nadia (+ sister Lidia) · little English",
  essentials(){
    return [
      {cls:"dark",lab:"Wi-Fi password",val:this.wifi.pass,sub:"Points inside & out",href:null,copy:true},
      {cls:"terra",lab:"Villa location",val:"Open in Maps",sub:"Tap for GPS route",href:gps(this.gps)},
      {cls:"",lab:"Check-in / out",val:"16:00 / 10:00",sub:"Call team if late",href:null},
      {cls:"",lab:"Water",val:"Drinkable",sub:"Filtered at the tap",href:null},
      {cls:"wide",lab:"Daily service & breakfast",val:"Mon–Sat · breakfast 9:00",sub:"Mommo & Nadia, ~09:00–12:00 · none on Sun / bank holidays",href:null}
    ];
  },
  homeCards(){return ["caretakers","pool","childpool","ac","fireplace","insects"];},
  houseCards(){return ["checkin","service","extras","practical","ts_electrics","ts_water","ext_lighting","rubbish","damages"];},
  cards:{
    caretakers:{ico:"☕",title:"Your caretakers & breakfast",body:`<p><strong>Mommo & Nadia</strong> (and Nadia's sister <strong>Lidia</strong>) look after the villa. They speak a little English — call your Local Specialist if you need to explain something.</p>
      <p>Service runs <strong>Mon–Sat, ~09:00–12:00</strong> (not Sundays/bank holidays). It starts with <strong>breakfast at 9:00</strong>, then cleaning. They have keys if you're out.</p>
      <p>Breakfast is a generous spread — bread, croissants, local pastries, yoghurt, fruit, cheese, ham, juices, coffee & jams. All included. <span class="em">Tell them sweet vs savoury preferences & any allergies in advance.</span></p>`},
    pool:{ico:"🏊",title:"The pool",body:`<div class="kv"><span class="k">Size</span><span class="v">18m × 4m</span></div><div class="kv"><span class="k">Depth</span><span class="v">1m – 2.6m</span></div>
      <p style="margin-top:12px">Shower before swimming. A lifesaving ring/reach pole is poolside (tell your Specialist if missing).</p>
      <div class="note warn"><strong>No diving. No glassware</strong> (plastic cups provided). Don't run the perimeter. Swimming at night or after alcohol isn't advised. Never leave children unsupervised — a float is not supervision.</div>
      <p>Mommo checks/cleans the pool regularly and tends the gardens, usually in the afternoon.</p>`},
    childpool:{ico:"🧒",title:"Children's pool & play area",body:`<p>Across the road there's a play area with a shallow children's pool — <strong>6m × 2.3m, 60cm deep</strong>.</p>
      <div class="note warn">No supervision is provided. Children must be supervised by an adult at all times; use is at your own risk.</div>`},
    ac:{ico:"❄️",title:"Air conditioning",body:`<div class="kv"><span class="k">Ideal setting</span><span class="v">23–26°C</span></div>
      <p style="margin-top:12px">Going lower won't cool faster and can damage units. AC runs ~10°C below outside temp. Use the <strong>"sleep"</strong> button at night for quiet, steady temps.</p>
      <div class="note">Switch units <strong>off</strong> when rooms are empty, windows are open, or you go out.</div>`},
    fireplace:{ico:"🔥",title:"The fireplace",body:`<p>Decorative only — <strong>it cannot be used.</strong></p>`},
    insects:{ico:"🦟",title:"Insects & wildlife",body:`<p>Sicilian countryside means insects. Avoid open doors/windows with lights on in the evening, use a plug-in anti-mosquito device in each room, and cover up / use repellent when eating outside after dark.</p>
      <p>Close & lock doors, windows and shutters when out — for security, weather and unwanted wildlife.</p>`},
    checkin:SHARED.checkin,
    service:{ico:"🧺",title:"Service & linen included",body:`<p>Daily service Mon–Sat (breakfast + cleaning). Recycling removed daily.</p>
      <p>Beds made & towels (incl. pool/beach) laid out on arrival. <strong>Sheets & towels changed at the mid-week clean</strong>; staying 2+ weeks adds a weekly change on your check-in day. If rooms are occupied during working hours, linen is left outside the door.</p>`},
    extras:{ico:"➕",title:"Extra services (cash, local)",body:`<div class="kv"><span class="k">Extra cleaning / ironing / washing</span><span class="v">€15 / hr</span></div>
      <div class="kv"><span class="k">Change of sheets</span><span class="v">€15 / room</span></div>
      <div class="kv"><span class="k">Change of towels</span><span class="v">€15 / room</span></div>
      <div class="kv"><span class="k">Sunday / bank holiday staff</span><span class="v">€15 / hr each</span></div>
      <p style="margin-top:12px;font-size:13px">Request early — suppliers aren't always available last minute. Paid locally in cash.</p>`},
    practical:{ico:"⚙️",title:"Kitchen, water & living",body:`<p><strong>Water</strong> from the taps is drinkable (filtered on arrival).</p>
      <p><strong>Dishwasher:</strong> rinse food off plates first to protect the filter.</p>
      <p><strong>Bathrooms:</strong> only small amounts of toilet paper down the loo — use bins otherwise. If a shower drains slowly, clear hair from the wire mesh in the plug.</p>
      <p><strong>Electricity & heating:</strong> use sparingly — lights off in daytime, AC/heating off when out or windows open.</p>
      <p><strong>Books:</strong> library is shelved by publisher & subject — return to place. <strong>Security cameras:</strong> a few external ones around the property. Bring in cushions & close umbrellas at night/in wind.</p>`},
    ts_electrics:{ico:"⚡",title:"Power cut — what to do",body:`<p>Emergency lighting comes on automatically. <strong>Mornings:</strong> ask the staff to check.</p>
      <p><strong>Afternoon/evening (staff gone):</strong></p>
      <ol class="steps">
        <li>Turn off all high-voltage appliances.</li>

const VILLAS = {aljafar:ALJAFAR, minerva:MINERVA};
let current = 'minerva';

/* ============ render ============ */
function cardHTML(c, id){
  return `<div class="card" id="card-${id}">
    <div class="card-head" onclick="toggleCard('${id}')">
      <h3><span class="ico">${c.ico||'•'}</span>${c.title}</h3>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="card-body"><div class="card-inner">${c.body}</div></div>
  </div>`;
}
function toggleCard(id){ document.getElementById('card-'+id).classList.toggle('open'); }

function render(){
  const v = VILLAS[current];
  document.getElementById('locale').innerHTML = v.locale;
  document.getElementById('btn-aljafar').classList.toggle('active', current==='aljafar');
  document.getElementById('btn-minerva').classList.toggle('active', current==='minerva');

  /* essentials */
  const ess = v.essentials();
  document.getElementById('essentials').innerHTML = ess.map(e=>{
    const inner = `<div class="lab">${e.lab}</div><div class="val">${e.val}</div>${e.sub?`<div class="sub">${e.sub}</div>`:''}`;
    if(e.href) return `<a class="ess ${e.cls}" href="${e.href}" target="_blank" rel="noopener">${inner}</a>`;
    if(e.copy) return `<div class="ess ${e.cls}" onclick="copyText('${e.val}')" style="cursor:pointer">${inner}</div>`;
    return `<div class="ess ${e.cls}">${inner}</div>`;
  }).join('');

  /* home cards */
  document.getElementById('home-cards').innerHTML = v.homeCards().map(id=>cardHTML(v.cards[id]||SHARED[id], id)).join('');
  /* house */
  document.getElementById('house-cards').innerHTML = v.houseCards().map(id=>cardHTML(v.cards[id]||SHARED[id], id)).join('');
  /* out */
  document.getElementById('out-sub').textContent = v.out.sub;
  document.getElementById('out-cards').innerHTML = v.out.cards.map(id=>cardHTML(v.outCards[id]||SHARED[id], id)).join('');
  /* eat */
  document.getElementById('eat-sub').textContent = v.eat.sub;
  document.getElementById('eat-cards').innerHTML = v.eat.cards.map(id=>cardHTML(v.eatCards[id], id)).join('');
  /* sos */
  document.getElementById('sos-numbers').innerHTML = SHARED.emergencyNums.map(n=>
    `<a class="ess terra" href="tel:${n.val}"><div class="lab">${n.lab}</div><div class="val">${n.val}</div><div class="sub">${n.sub}</div></a>`
  ).join('');
  document.getElementById('sos-cards').innerHTML = v.sos.cards.map(id=>cardHTML(v.sosCards[id]||SHARED[id], id)).join('');

  /* clear search */
  const s=document.getElementById('search'); if(s) s.value='';
  document.getElementById('search-wrap').style.display='none';
  document.getElementById('home-content').style.display='';
}

function setVilla(key){
  if(current===key) return;
  current = key;
  render();
  setView('home', document.querySelector('nav.tabs button[data-view="home"]'));
  window.scrollTo({top:0,behavior:'smooth'});
}

function setView(view, btn){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
  (btn||document.querySelector(`nav.tabs button[data-view="${view}"]`)).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}

function copyText(t){
  navigator.clipboard && navigator.clipboard.writeText(t);
  const els=[...document.querySelectorAll('.ess.dark .val')];
  // brief feedback
  const el = event.currentTarget.querySelector('.val');
  const orig = el.textContent; el.textContent='Copied ✓';
  setTimeout(()=>el.textContent=orig, 1100);
}

/* ============ search ============ */
function buildIndex(v){
  const idx=[];
  const add=(coll,viewName,tabKey)=>{Object.entries(coll).forEach(([id,c])=>{
    idx.push({id, title:c.title, ico:c.ico, body:c.body, view:viewName, tab:tabKey});
  });};
  add(v.cards,'house','house'); // primary home
  add(v.outCards,'out','out');
  add(v.eatCards,'eat','eat');
  add(v.sosCards,'sos','sos');
  // de-dupe by id (cards shared between home & house)
  const seen={}; return idx.filter(x=>{if(seen[x.id])return false;seen[x.id]=true;return true;});
}
function stripHTML(h){return h.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ');}

function runSearch(q){
  const wrap=document.getElementById('search-wrap');
  const home=document.getElementById('home-content');
  q=q.trim().toLowerCase();
  if(!q){wrap.style.display='none';home.style.display='';return;}
  home.style.display='none';wrap.style.display='';
  const v=VILLAS[current];
  const idx=buildIndex(v);
  const hits=idx.map(item=>{
    const hay=(item.title+' '+stripHTML(item.body)).toLowerCase();
    let score=0;
    q.split(/\s+/).forEach(w=>{
      if(item.title.toLowerCase().includes(w)) score+=5;
      if(hay.includes(w)) score+=1;
    });
    return {item,score};
  }).filter(h=>h.score>0).sort((a,b)=>b.score-a.score).slice(0,8);

  if(!hits.length){wrap.innerHTML=`<div class="no-res">Nothing found for "${q}". Try a simpler word like wifi, pizza, fuse, beach or pharmacy.</div>`;return;}
  wrap.innerHTML='<div class="cards">'+hits.map(h=>{
    const c=h.item;
    return `<div class="card open" id="card-${c.id}">
      <div class="card-head" onclick="toggleCard('${c.id}')">
        <h3><span class="ico">${c.ico||'•'}</span>${c.title}</h3>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body"><div class="card-inner">${c.body}</div></div>
    </div>`;
  }).join('')+'</div>';
}

render();
</script>
